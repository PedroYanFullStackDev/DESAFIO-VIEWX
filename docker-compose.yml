services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viewx-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - IG_SESSION_ID=${IG_SESSION_ID:33230648311%3ARVMcMbLeEc1UrF%3A21%3AAYiHpCRizO4RVIGEMSKdx_yNygDBYWioLK5vGfHxYw}
    networks:
      - viewx-network
    restart: unless-stopped
    shm_size: '2gb'

  frontend:
    build:
      context: ./desafio-viewx
      dockerfile: Dockerfile
    container_name: viewx-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - viewx-network
    restart: unless-stopped

networks:
  viewx-network:
    driver: bridge
